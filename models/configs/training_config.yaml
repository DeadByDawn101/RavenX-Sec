# RavenX-Sec Training Configuration
# Base model: Qwen3-8B via Unsloth + QLoRA
# Hardware: RTX 3090 (24 GB VRAM) on Star Platinum Linux rig

base_model: "georgehenney/Qwen3-8B-heretic"
base_model_gguf: "mradermacher/Qwen3-8B-heretic-i1-GGUF"  # For inference on M4 Max
evaluation_model: "GLM-5.1"  # Judge model on M4 Max

quantization:
  bits: 4
  type: "nf4"
  double_quant: true
  compute_dtype: "bfloat16"

lora:
  rank: 64
  alpha: 128
  dropout: 0.05
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"

training:
  learning_rate: 2.0e-4
  batch_size: 4
  gradient_accumulation_steps: 8
  effective_batch_size: 32
  epochs: 3
  max_seq_len: 8192
  warmup_ratio: 0.03
  weight_decay: 0.01
  optimizer: "adamw_8bit"
  scheduler: "cosine"
  max_grad_norm: 1.0
  fp16: false
  bf16: true
  gradient_checkpointing: true

data:
  train_split: 0.9
  eval_split: 0.1
  seed: 42
  format: "chatml"  # Qwen3 native format
  max_samples: null  # Use all data

  sources:
    offensive:
      - "data/offensive/privesc_chains/"
      - "data/offensive/web_pentest/"
      - "data/offensive/api_testing/"
      - "data/offensive/exploit_pocs/"
    defensive:
      - "data/defensive/cve_fixes/"
      - "data/defensive/hardening/"
      - "data/defensive/compliance/"
    analytical:
      - "data/analytical/cvss_vectors/"
      - "data/analytical/frameworks/"
      - "data/analytical/attack_mapping/"
    synthetic:
      - "data/synthetic/"
    world_model:
      - "data/world_model/"
    distilled:
      - name: "WithinUsAI/claude_mythos_distilled_25k"
        source: "huggingface"
        split: "train"
        categories:
          - "cybersecurity"       # Primary: exploit chains, defense roadmaps
          - "advanced_coding"     # Memory-safe impls, formal verification
          - "agentic_planning"    # Autonomous agent architectures
          - "mathematical_reasoning"
          - "scientific_analysis"
          - "general_expert_qa"
        format: "messages"        # [{role, content}, ...] pairs
        license: "Apache-2.0"

    # ── Agentic Coding (v0.3+) ──────────────────────────────────────────
    agentic:
      - name: "WithinUsAI/AgentAngel_100k"
        source: "huggingface"
        splits: ["qa", "instruct", "thinking", "reasoning", "chat"]
        total_rows: 500000
        format: "jsonl"
        license: "CC0-1.0"
        notes: "Agentic coding with evidence sources, plan→patch→verify→iterate"

    # ── Real Vulnerability Patches (CVE Fix Commits) ────────────────────
    vuln_patches:
      - name: "JetBrains-Research/commit-chronicle"
        source: "huggingface"
        notes: "Millions of Git commits with code diffs, filter for security patches"
        usage: "Extract security-tagged commits, CVE-mentioning messages"

      - name: "bigcode/commitpack"
        source: "huggingface"
        notes: "Billions of tokens of code changes across 300+ languages"
        usage: "Keyword/regex filter for security fix patterns"

      - name: "ByteDance/PatchEval"
        source: "huggingface"
        notes: "1000 real-world vulnerabilities, 65 CWE categories, raw patch diffs"
        usage: "Gold-standard CVE→patch pairs with executable validation"

    # ── Security-Focused Code (CWE Examples & OWASP) ────────────────────
    security_code:
      - name: "bigcode/vuln-eval"
        source: "huggingface"
        notes: "Evaluate model capacity to recognize, isolate, and repair vulnerabilities"

      - name: "Fraser/cwe-benchmark"
        source: "huggingface"
        notes: "Source code mapped to CWE IDs, vulnerable vs secure counterparts"

    # ── Infrastructure Hardening Scripts ─────────────────────────────────
    hardening:
      - name: "bigcode/the-stack-v2"
        source: "huggingface"
        notes: "Filter by extension: .yml/.yaml (Ansible), .tf/.hcl (Terraform), .sh (Shell)"
        usage: "Extract infrastructure-as-code with security baselines"

      - name: "codeparrot/github-code"
        source: "huggingface"
        notes: "Massive GitHub sweep, segment by language for IaC security files"

    # ── Pentest Tool Code ────────────────────────────────────────────────
    pentest_code:
      - name: "HackerSignal Threat Intel Dataset"
        source: "huggingface"
        notes: "Historical cybersecurity docs, exploit scripts, PoCs linked to CVE lifecycle"

      - name: "isek/cybersecurity-instructions"
        source: "huggingface"
        notes: "Instruction-tuning with adversarial examples, RE walkthroughs, security scripting"

output:
  model_dir: "models/checkpoints/ravenx-sec-v0.1"
  hub_model_id: "DeadByDawn101/RavenX-Sec-8B"
  push_to_hub: false  # Manual push after validation

lewm:
  enabled: true
  encoder_params: "5M"
  predictor_params: "10M"
  sigreg_lambda: 0.1
  sigreg_projections: 1024
  trajectory_length: 16
  checkpoint_dir: "models/checkpoints/lewm-security-v0.1"

evaluation:
  benchmarks:
    - "xbow_lite"      # Subset of XBOW security benchmark
    - "cvss_scoring"   # CVSS vector generation accuracy
    - "remediation"    # Fix correctness evaluation
    - "compliance"     # Framework mapping accuracy
  judge_model: "GLM-5.1"
  judge_prompt: "Evaluate the security finding for accuracy, completeness, and actionability."

    # ── NEW: Comprehensive Security Training Datasets (v3.0) ────────────
    security_instruction_tuning:
      - name: "Trendyol/Trendyol-Cybersecurity-Instruction-Tuning-Dataset"
        source: "huggingface"
        notes: "Enterprise cybersecurity instruction tuning from Trendyol"

      - name: "WNT3D/Ultimate-Offensive-Red-Team"
        source: "huggingface"
        notes: "Offensive red team techniques and procedures"

      - name: "AYI-NEDJIMI/bug-bounty-pentest-en"
        source: "huggingface"
        notes: "Bug bounty and pentesting data in English"

      - name: "auren-research/cve-sft-v5"
        source: "huggingface"
        notes: "CVE-specific SFT data, version 5"

      - name: "theelderemo/pentesting-explanations"
        source: "huggingface"
        notes: "Pentesting technique explanations and walkthroughs"

      - name: "Rootkit7/pentest-redteam-steering"
        source: "huggingface"
        notes: "Red team steering and pentest methodology"

      - name: "cpagac/venomx-pentesting-harmful"
        source: "huggingface"
        notes: "Pentesting scenarios including advanced techniques"

      - name: "SkywardNomad92/pentest-findings-v2"
        source: "huggingface"
        notes: "Pentest findings with classification and remediation"

      - name: "acnimatic3722/kali-linux-pentesting-data"
        source: "huggingface"
        notes: "Kali Linux tool usage and pentesting workflows"

      - name: "CJJones/Synthetic_PenTest_Reports"
        source: "huggingface"
        notes: "Synthetic penetration testing reports with findings"

      - name: "nangyall/4-Security-Tools-Pentesting"
        source: "huggingface"
        notes: "Security tools usage for pentesting (nmap, burp, etc)"

    # ── MCP Tools (for agent harness integration) ────────────────────
    mcp_tools:
      - name: "ChromeDevTools/chrome-devtools-mcp"
        source: "github"
        notes: "Browser automation for web app pentesting, scraping scan dashboards, interacting with target applications"
        usage: "Security agent skill — web app recon, form fuzzing, DOM inspection, XSS testing via browser"
